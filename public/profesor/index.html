
<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Panel del Profesor | FQ INGENIEROS</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
	<link href="../assets/css/notifications.css" rel="stylesheet" />
	<style>
		*{box-sizing:border-box;margin:0;padding:0}
		body{font-family:'Inter',system-ui,sans-serif;background:#f7f9fc;color:#334155;min-height:100vh}
		.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
		.sidebar{background:#0f172a;color:#e2e8f0;padding:0;display:flex;flex-direction:column}
		.sidebar-brand{display:flex;align-items:center;gap:10px;padding:20px 22px;border-bottom:1px solid rgba(255,255,255,.08)}
		.sidebar-brand img{width:36px;height:36px;border-radius:8px;object-fit:cover}
		.sidebar-brand strong{font-size:13px;color:#fff}
		.sidebar-brand span{font-size:10px;color:#f59e0b;letter-spacing:1px;text-transform:uppercase;display:block;font-weight:600}
		.sidebar-nav{flex:1;padding:16px 12px}
		.nav-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;padding:12px 10px 6px;margin-top:8px}
		.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:#94a3b8;text-decoration:none;font-size:14px;font-weight:500;transition:all .2s;cursor:pointer;margin-bottom:2px}
		.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
		.nav-item.active{background:#d97706;color:#fff}
		.nav-item .material-icons-round{font-size:20px}
		.nav-item .badge-count{margin-left:auto;background:#dc2626;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;min-width:20px;text-align:center}
		.sidebar-footer{padding:16px 22px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:#64748b}
		.sidebar-footer a{color:#f59e0b;text-decoration:none}
		.main{padding:0;overflow-y:auto;max-height:100vh}
		.top-bar{background:#fff;border-bottom:1px solid #dce3ed;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:10}
		.top-bar h2{font-size:18px;font-weight:700;color:#0f172a;display:flex;align-items:center;gap:8px}
		.top-bar-actions{display:flex;align-items:center;gap:14px}
		.prof-badge{background:#fffbeb;color:#d97706;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
		.btn-logout{background:none;border:1.5px solid #dce3ed;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;color:#334155;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;font-family:inherit}
		.btn-logout:hover{background:#fef2f2;border-color:#fecaca;color:#dc2626}
		.content{padding:28px 32px}
		.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:32px}
		.stat-card{background:#fff;border:1px solid #dce3ed;border-radius:14px;padding:22px;display:flex;align-items:center;gap:16px;transition:box-shadow .2s}
		.stat-card:hover{box-shadow:0 4px 16px rgba(15,23,42,.08)}
		.stat-icon{width:48px;height:48px;border-radius:12px;display:grid;place-items:center}
		.stat-icon .material-icons-round{font-size:24px;color:#fff}
		.stat-icon.amber{background:linear-gradient(135deg,#d97706,#f59e0b)}
		.stat-icon.blue{background:linear-gradient(135deg,#1565c0,#1e88e5)}
		.stat-icon.green{background:linear-gradient(135deg,#16a34a,#22c55e)}
		.stat-info strong{display:block;font-size:28px;font-weight:800;color:#0f172a}
		.stat-info span{font-size:13px;color:#64748b}
		.panel{display:none}
		.panel.active{display:block}
		.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
		.panel-header h3{font-size:20px;font-weight:700;color:#0f172a}
		.table-wrap{background:#fff;border:1px solid #dce3ed;border-radius:14px;overflow:hidden}
		table{width:100%;border-collapse:collapse}
		thead{background:#f7f9fc}
		th{text-align:left;padding:12px 16px;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #dce3ed}
		td{padding:12px 16px;font-size:14px;color:#334155;border-bottom:1px solid #eef2f7}
		tr:last-child td{border-bottom:none}
		tr:hover td{background:#f7f9fc}
		.user-cell{display:flex;align-items:center;gap:10px}
		.user-avatar{width:34px;height:34px;border-radius:50%;background:#d97706;color:#fff;display:grid;place-items:center;font-size:14px;font-weight:700;flex-shrink:0}
		.user-name{font-weight:600;color:#0f172a}
		.user-email{font-size:12px;color:#64748b}
		.status-badge{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
		.status-badge.passed{background:#f0fdf4;color:#16a34a}
		.status-badge.failed{background:#fef2f2;color:#dc2626}
		.status-badge.pending{background:#fffbeb;color:#d97706}
		.course-card{background:#fff;border:1px solid #dce3ed;border-radius:14px;padding:22px;margin-bottom:18px}
		.course-card h4{font-size:17px;font-weight:700;color:#0f172a;display:flex;align-items:center;gap:8px;margin-bottom:14px}
		.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
		.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
		.btn-amber{background:#d97706;color:#fff}
		.btn-amber:hover{background:#b45309}
		.btn-blue{background:#1565c0;color:#fff}
		.btn-blue:hover{background:#1e88e5}
		.btn-outline-sm{background:transparent;border:1.5px solid #dce3ed;color:#334155}
		.btn-outline-sm:hover{background:#eff6ff;border-color:#1565c0;color:#1565c0}
		.action-btn{background:none;border:1px solid #dce3ed;border-radius:8px;padding:5px 8px;cursor:pointer;color:#64748b;transition:all .2s;display:inline-flex;align-items:center;gap:4px;font-size:12px;font-family:inherit}
		.action-btn:hover{background:#eff6ff;border-color:#1565c0;color:#1565c0}
		.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #dce3ed;border-radius:10px;padding:8px 14px;width:280px;transition:border-color .2s}
		.search-box:focus-within{border-color:#d97706}
		.search-box input{border:none;outline:none;font-size:14px;font-family:inherit;width:100%;color:#0f172a;background:transparent}
		.search-box .material-icons-round{font-size:20px;color:#64748b}
		.empty-state{text-align:center;padding:48px 20px;color:#64748b}
		.empty-state .material-icons-round{font-size:48px;color:#dce3ed;margin-bottom:12px}
		.material-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border:1px solid #dce3ed;border-radius:10px;margin-bottom:8px}
		.material-item .material-icons-round{font-size:22px;color:#d97706}
		.material-item .mat-info{flex:1}
		.material-item .mat-name{font-weight:600;font-size:14px;color:#0f172a}
		.material-item .mat-url{font-size:12px;color:#64748b;word-break:break-all}
		.login-gate{position:fixed;inset:0;z-index:200;background:#f7f9fc;display:flex;align-items:center;justify-content:center;padding:20px}
		.login-card{background:#fff;border-radius:18px;width:100%;max-width:420px;padding:40px;box-shadow:0 8px 32px rgba(15,23,42,.10);text-align:center}
		.login-card h2{font-size:22px;font-weight:800;color:#0f172a;margin:16px 0 6px}
		.login-card p{font-size:14px;color:#64748b;margin-bottom:24px;line-height:1.5}
		.code-input{width:200px;padding:14px 20px;border:2px solid #dce3ed;border-radius:12px;font-size:24px;font-weight:700;text-align:center;letter-spacing:8px;font-family:inherit;transition:border-color .2s}
		.code-input:focus{outline:none;border-color:#d97706}
		.login-error{color:#dc2626;font-size:13px;margin-top:10px;display:none}
		@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{display:none}.stats-grid{grid-template-columns:1fr}.card-grid{grid-template-columns:1fr}}
		@media(max-width:600px){.content{padding:20px 16px}.top-bar{padding:0 16px}}
	</style>
</head>
