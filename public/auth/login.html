<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | FQ INGENIEROS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link href="/assets/css/notifications.css" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/header.css" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#f7f9fc;color:#334155;min-height:100vh;display:flex;flex-direction:column}
    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:36px 16px}
    .card{background:#fff;border:1px solid #dce3ed;border-radius:18px;width:100%;max-width:420px;padding:40px 36px;box-shadow:0 4px 24px rgba(15,23,42,.06)}
    .card-header{text-align:center;margin-bottom:28px}
    .card-header .icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#1565c0,#1e88e5);display:inline-grid;place-items:center;margin-bottom:14px}
    .card-header .icon .material-icons-round{font-size:28px;color:#fff}
    .card-header h1{font-size:24px;font-weight:800;color:#0f172a;margin-bottom:6px}
    .card-header p{font-size:14px;color:#64748b}
    .form-group{margin-bottom:18px}
    .form-label{display:block;margin-bottom:5px;font-size:13px;font-weight:600;color:#334155}
    .form-control{
      width:100%;padding:11px 13px;background:#f7f9fc;
      border:1.5px solid #dce3ed;border-radius:10px;
      color:#0f172a;font-size:14px;font-family:inherit;transition:border-color .2s;
    }
    .form-control:focus{outline:none;border-color:#1e88e5;box-shadow:0 0 0 3px rgba(30,136,229,.1);background:#fff}
    .password-wrap{position:relative}
    .password-wrap .form-control{padding-right:44px}
    .toggle-pw{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;display:grid;place-items:center}
    .toggle-pw:hover{color:#1565c0}
    .form-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:13px}
    .form-options label{display:flex;align-items:center;gap:6px;color:#334155;cursor:pointer}
    .form-options input[type="checkbox"]{accent-color:#1565c0;width:15px;height:15px}
    .form-options a{color:#1565c0;text-decoration:none;font-weight:500}
    .form-options a:hover{text-decoration:underline}
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
    .btn-primary{background:#1565c0;color:#fff}
    .btn-primary:hover{background:#1e88e5;box-shadow:0 4px 18px rgba(21,101,192,.3)}
    .divider{display:flex;align-items:center;gap:12px;margin:22px 0;font-size:12px;color:#64748b}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#dce3ed}
    .social-buttons{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
    .btn-social{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 14px;border-radius:10px;font-size:14px;font-weight:600;border:1.5px solid #dce3ed;cursor:pointer;transition:all .2s;font-family:inherit;background:#fff;color:#334155}
    .btn-social:hover{border-color:#94a3b8;box-shadow:0 2px 8px rgba(15,23,42,.08)}
    .btn-social svg{width:20px;height:20px;flex-shrink:0}
    .btn-social.btn-google:hover{border-color:#4285f4;background:#f8faff}
    .card-footer{text-align:center;font-size:13px;color:#64748b}
    .card-footer a{color:#1565c0;text-decoration:none;font-weight:600}
    .card-footer a:hover{text-decoration:underline}
    .alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:8px}
    .alert-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
    .alert-success{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a}
    .alert .material-icons-round{font-size:18px}
    .page-footer{text-align:center;padding:18px;color:#64748b;font-size:12px;border-top:1px solid #dce3ed}
    /* Forgot password overlay */
    .forgot-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:100;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s}
    .forgot-overlay.active{display:flex}
    .forgot-card{background:#fff;border-radius:18px;width:100%;max-width:420px;padding:36px 32px;box-shadow:0 12px 48px rgba(15,23,42,.15);position:relative;animation:slideUp .25s ease-out}
    .forgot-close{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:#64748b;display:grid;place-items:center;border-radius:8px;width:32px;height:32px;transition:all .2s}
    .forgot-close:hover{background:#f1f5f9;color:#0f172a}
    .forgot-header{text-align:center;margin-bottom:24px}
    .forgot-header .forgot-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#f59e0b,#f97316);display:inline-grid;place-items:center;margin-bottom:12px}
    .forgot-header .forgot-icon .material-icons-round{font-size:26px;color:#fff}
    .forgot-header h2{font-size:20px;font-weight:800;color:#0f172a;margin-bottom:6px}
    .forgot-header p{font-size:13px;color:#64748b;line-height:1.5}
    .forgot-alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;align-items:flex-start;gap:10px;line-height:1.5}
    .forgot-alert .material-icons-round{font-size:18px;flex-shrink:0;margin-top:1px}
    .forgot-alert.alert-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
    .forgot-alert.alert-success{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a}
    .forgot-alert.alert-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1565c0}
    .forgot-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-family:inherit;background:#f59e0b;color:#fff}
    .forgot-btn:hover{background:#f97316;box-shadow:0 4px 18px rgba(245,158,11,.3)}
    .forgot-btn:disabled{opacity:.65;cursor:not-allowed}
    .forgot-back{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:16px;font-size:13px;color:#64748b;text-decoration:none;cursor:pointer;background:none;border:none;font-family:inherit;width:100%}
    .forgot-back:hover{color:#1565c0}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:480px){.card{padding:28px 20px}.forgot-card{padding:28px 20px}}
  </style>
</head>
<body>
    <div class="page">
      <div class="card">
        <div class="card-header">
          <div class="icon"><span class="material-icons-round">login</span></div>
          <h1>Iniciar sesión</h1>
          <p>Accede con tu correo o Google</p>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="email">Correo electrónico</label>
            <input class="form-control" type="email" id="email" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <input class="form-control" type="password" id="password" required autocomplete="current-password" />
          </div>
          <button class="btn btn-primary" type="submit">Iniciar sesión</button>
        </form>
        <div style="margin:18px 0;text-align:center;">o</div>
        <button id="googleLogin" class="btn btn-social btn-google" type="button" style="width:100%">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><g><path fill="#4285F4" d="M43.6 20.5H42V20H24v8h11.3C34.7 32.1 29.8 35 24 35c-6.1 0-11.3-4.1-13.1-9.6-1.8-5.5 0-11.5 4.7-15.1C19.2 6.1 21.6 5 24 5c4.1 0 7.9 1.6 10.7 4.3l7.1-7.1C37.5 0.7 30.9-2 24 0.1 12.1 3.2 3.2 14.1 3.2 26c0 11.9 8.9 22.8 20.8 25.9 6.9 2.1 13.5-0.6 18.8-5.2l-7.1-7.1C31.9 46.4 28.1 48 24 48c-2.4 0-4.8-1.1-6.6-2.9-4.7-3.6-6.5-9.6-4.7-15.1C12.7 28.9 17.9 33 24 33c5.8 0 10.7-2.9 13.3-7.5 1.2-2.1 1.9-4.5 1.9-7V20.5z"/></g></svg>
          Iniciar sesión con Google
        </button>
        <div id="loginError" class="alert alert-error" style="display:none;margin-top:12px"></div>
        <div class="card-footer">
          ¿No tienes cuenta? <a href="/auth/registro.html">Regístrate</a>
        </div>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="/assets/js/firebase-config.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        firebase.auth().onAuthStateChanged(function(user) {
          if (user) {
            window.location.href = '/index.html';
          }
        });
        var loginForm = document.getElementById('loginForm');
        var loginError = document.getElementById('loginError');
        loginForm.addEventListener('submit', function(e) {
          e.preventDefault();
          loginError.style.display = 'none';
          var email = document.getElementById('email').value.trim();
          var password = document.getElementById('password').value;
          firebase.auth().signInWithEmailAndPassword(email, password)
            .then(function() {
              window.location.href = '/index.html';
            })
            .catch(function(error) {
              loginError.textContent = error.message;
              loginError.style.display = 'flex';
            });
        });
        var googleLogin = document.getElementById('googleLogin');
        googleLogin.addEventListener('click', function() {
          var provider = new firebase.auth.GoogleAuthProvider();
          firebase.auth().signInWithPopup(provider)
            .then(function() {
              window.location.href = '/index.html';
            })
            .catch(function(error) {
              loginError.textContent = error.message;
              loginError.style.display = 'flex';
            });
        });
      });
    </script>
