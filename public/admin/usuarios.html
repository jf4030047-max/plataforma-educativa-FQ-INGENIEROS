<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios | Admin FQ INGENIEROS</title>
  <link href="../assets/css/notifications.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <script src="../assets/js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #f7f9fc; color: #334155; }
    .container { max-width: 700px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 32px; }
    h2 { margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
    th { background: #f1f5f9; text-align: left; }
    tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
  <div class="container">
    <h2><span class="material-icons-round">people</span> Usuarios registrados</h2>
    <table id="usuarios-table">
      <thead>
        <tr><th>Email</th><th>Nombre</th><th>Rol</th></tr>
      </thead>
      <tbody>
        <!-- Usuarios serán cargados aquí -->
      </tbody>
    </table>
  </div>
  <script>
    const db = firebase.firestore();
    db.collection('users').get().then(snapshot => {
      const tbody = document.querySelector('#usuarios-table tbody');
      snapshot.forEach(doc => {
        const user = doc.data();
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${user.email || ''}</td><td>${user.nombre || ''}</td><td>${user.rol || ''}</td>`;
        tbody.appendChild(tr);
      });
    });
  </script>
</body>
</html>
