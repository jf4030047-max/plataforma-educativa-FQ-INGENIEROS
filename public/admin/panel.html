<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel del Administrador | FQ INGENIEROS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/notifications.css" />
  <link rel="stylesheet" href="../../assets/css/header.css" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#f7f9fc;color:#334155;min-height:100vh}
    .container{width:min(1140px,92%);margin:0 auto}
    .page{padding:88px 0 60px}
    .breadcrumb{font-size:12px;color:#64748b;margin-bottom:20px;display:flex;align-items:center;gap:4px}
    .breadcrumb a{color:#1565c0;text-decoration:none}
    .breadcrumb a:hover{text-decoration:underline}
    .panel-layout{display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start}
    .panel-main .badge-row{display:flex;gap:8px;margin-bottom:12px}
    .cbadge{padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .cbadge.active{background:#d1fae5;color:#065f46}
    .cbadge.info{background:#dbeafe;color:#1565c0}
    .panel-main h1{font-size:clamp(24px,3.5vw,34px);font-weight:800;color:#0f172a;margin-bottom:10px;line-height:1.2}
    .panel-main .desc{font-size:15px;color:#475569;line-height:1.7;margin-bottom:20px}
    .panel-meta{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:24px}
    .panel-meta-item{display:flex;align-items:center;gap:6px;font-size:13px;color:#64748b;font-weight:500}
    .panel-meta-item .material-icons-round{font-size:18px;color:#1565c0}
    .section{background:#fff;border:1px solid #dce3ed;border-radius:14px;padding:22px;margin-bottom:18px}
    .section h2{font-size:17px;font-weight:700;color:#0f172a;display:flex;align-items:center;gap:8px;margin-bottom:14px}
    .section h2 .material-icons-round{font-size:20px;color:#1565c0}
    .page-footer{text-align:center;padding:28px 0;color:#64748b;font-size:13px;border-top:1px solid #dce3ed;margin-top:48px}
    .page-footer a{color:#1565c0;text-decoration:none}
    @media(max-width:800px){.panel-layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="authLoading" style="display:flex;align-items:center;justify-content:center;position:fixed;inset:0;background:#f7f9fc;z-index:9999;font-size:18px;color:#1565c0;font-weight:600">El panel está cargando. Si ves esto por mucho tiempo, contacta soporte.</div>
  <div id="diagnosticError" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(255,255,255,0.98);color:#b91c1c;font-size:17px;font-weight:700;align-items:center;justify-content:center;text-align:center;padding:40px"></div>
  <main class="container page">
    <div class="panel-layout">
      <div class="panel-main">
        <div class="badge-row">
          <span class="cbadge active">Admin</span>
        </div>
        <h1>Panel de administración</h1>
        <div class="desc">Gestiona los cursos y precios de la plataforma.</div>
        <div id="panelContent">Si ves este mensaje, el HTML está cargando correctamente.</div>
      </div>
      <div class="panel-meta">
        <div class="panel-meta-item"><span class="material-icons-round">verified_user</span>Acceso restringido</div>
      </div>
    </div>
  </main>
  <footer class="page-footer">
    Plataforma Educativa FQ INGENIEROS &copy; 2026
  </footer>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../../assets/js/firebase-config.js"></script>
  <script>
    window.addEventListener('error', function(e) {
      var diag = document.getElementById('diagnosticError');
      if (diag) {
        diag.style.display = 'flex';
        diag.innerHTML = 'Error de carga:<br>' + (e.message || e.error || e.filename || 'Error desconocido') + '<br><br><span style="font-size:14px;font-weight:400;color:#64748b">Revisa la consola del navegador para más detalles.</span>';
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      var diag = document.getElementById('diagnosticError');
      if (diag) {
        diag.style.display = 'flex';
        diag.innerHTML = 'Error de promesa:<br>' + (e.reason && e.reason.message ? e.reason.message : e.reason || 'Error desconocido') + '<br><br><span style="font-size:14px;font-weight:400;color:#64748b">Revisa la consola del navegador para más detalles.</span>';
      }
    });
    // Fallback: mostrar botón de login si tarda mucho
    let authTimeout = setTimeout(function() {
      var loading = document.getElementById('authLoading');
      if (loading) loading.innerHTML = 'No se pudo conectar.<br><a href="../../auth/login.html" style="color:#fff;background:#1565c0;padding:10px 18px;border-radius:8px;display:inline-block;margin-top:18px;text-decoration:none">Ir a iniciar sesión</a>';
    }, 6000);
    // Redirección a login si no está autenticado
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof auth === 'undefined') return;
      auth.onAuthStateChanged(function(user) {
        clearTimeout(authTimeout);
        var loading = document.getElementById('authLoading');
        if (loading) loading.remove();
        if (!user) {
          window.location.href = '../../auth/login.html?redirect=' + encodeURIComponent(window.location.href);
        }
      });
    });
  </script>
  <script src="admin-panel.js"></script>
</body>
</html>
