<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear Curso | FQ INGENIEROS</title>
  <link href="../assets/css/notifications.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <script src="../assets/js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #f7f9fc; color: #334155; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 32px; }
    h2 { margin-bottom: 24px; }
    label { display: block; margin-top: 18px; font-weight: 600; }
    input, textarea { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #d1d5db; border-radius: 8px; }
    button { margin-top: 24px; background: #16a34a; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <h2><span class="material-icons-round">add_circle</span> Crear Nuevo Curso</h2>
    <form id="crearCursoForm">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" required />
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" name="descripcion" rows="3"></textarea>
      <label for="precio">Precio</label>
      <input type="number" id="precio" name="precio" min="0" step="0.01" />
      <label for="fecha">Fecha</label>
      <input type="date" id="fecha" name="fecha" />
      <label for="temas">Temas (separados por coma)</label>
      <input type="text" id="temas" name="temas" />
      <button type="submit">Crear curso</button>
    </form>
    <div id="msg"></div>
  </div>
  <script>
    const db = firebase.firestore();
    const form = document.getElementById('crearCursoForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const data = {
        name: form.nombre.value,
        descripcion: form.descripcion.value,
        price: parseFloat(form.precio.value),
        fecha: form.fecha.value,
        temas: form.temas.value.split(',').map(t => t.trim()),
        active: true
      };
      db.collection('courses').add(data)
        .then(() => { msg.textContent = 'Curso creado correctamente.'; form.reset(); })
        .catch(err => { msg.textContent = 'Error: ' + err.message; });
    });
  </script>
</body>
</html>
