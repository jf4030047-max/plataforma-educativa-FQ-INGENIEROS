<html lang="es">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/notifications.css" />
  <link rel="stylesheet" href="../assets/css/header.css" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#f7f9fc;color:#334155;min-height:100vh}
    .container{width:min(900px,92%);margin:0 auto}
    /* ...todo el CSS del archivo original... */

</head>
<body>

  <header class="top-bar">
    <div class="container top-bar-inner">
      <a class="brand" href="../index.html">
        <img src="../assets/img/logo-fq.png" alt="FQ Ingenieros" />
        <div><strong>FQ INGENIEROS</strong><span>Plataforma Educativa</span></div>
      </a>
      <div class="top-bar-right">
        <div class="navbar-actions" id="navActions"></div>
        <a class="back-link" href="../dashboard/index.html"><span class="material-icons-round">arrow_back</span> Dashboard</a>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <div id="content">
        <div class="loading"><span class="material-icons-round" style="font-size:28px;color:#dce3ed;display:block;margin-bottom:8px">hourglass_top</span>Cargando curso...</div>
      </div>
    </div>
  </main>

  <footer class="page-footer">
    <div class="container">
      <p>© 2026 FQ INGENIEROS · <a href="../index.html">Inicio</a> · <a href="../empresa/about.html">Nosotros</a></p>
    </div>
  </footer>

  <!-- Offline banner -->
  <div class="offline-banner" id="offlineBanner">
    <span class="material-icons-round">wifi_off</span> Estás sin conexión — Los datos guardados están disponibles
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/auth-ui.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="../assets/js/certificate-generator.js"></script>

  <script>
    /* ══════════════════════════════════════════════
       Course data - loaded from Firestore
       ══════════════════════════════════════════════ */
    var COURSES = {};
    var SCHEDULES = {};

    var courseId = new URLSearchParams(window.location.search).get('course');

    function showError(msg, icon) {
      var contentEl = document.getElementById('content');
      contentEl.innerHTML = '<div class="state-box">' +
        '<span class="material-icons-round">' + (icon || 'error_outline') + '</span>' +
        '<h2>Error</h2>' +
        '<p>' + msg + '</p>' +
        '<a href="../dashboard/index.html" class="btn btn-primary">Ir al dashboard</a>' +
        '</div>';
    }

    // Load courses from Firestore (shared by public agenda and private view)
    function loadCoursesFromFirestore() {
      return db.collection('courses').get().then(function(snapshot) {
        snapshot.forEach(function(doc) {
          const data = doc.data();
          COURSES[doc.id] = {
            id: doc.id,
            name: data.name || '',
            icon: data.icon || 'menu_book',
            duration: data.duration || '',
            sessions: data.sessions || 1,
            modality: data.modality || 'En vivo',
            price: data.price || 0,
            desc: data.desc || '',
            sessionDate: data.sessionDate || null,
            scheduleTime: data.scheduleTime || {},
            zoomLink: data.zoomLink || '',
            recordingUrl: data.recordingUrl || '',
            startDate: data.startDate || '',
            startTime: data.startTime || '',
            endTime: data.endTime || '',
            temario: data.temario || [],
            schedules: data.schedules || []
          };
          if (data.schedules && data.schedules.length > 0) {
            SCHEDULES[doc.id] = data.schedules;
          }
        });
      });
    }

    auth.onAuthStateChanged(function(user) {
      var contentEl = document.getElementById('content');

      if (!user) {
        showError('Debes iniciar sesión para acceder al contenido de tu curso.', 'lock');
        return;
      }

      loadCoursesFromFirestore().then(function() {
        if (!courseId || !COURSES[courseId]) {
          showError('El curso solicitado no existe o el enlace es incorrecto.', 'search_off');
          return;
        }

        var cacheKey = 'session_enrollment_' + user.uid + '_' + courseId;

        try {
          var cached = localStorage.getItem(cacheKey);
          if (cached) {
            var cachedData = JSON.parse(cached);
            if (cachedData.status === 'active') {
              renderPanel(COURSES[courseId], cachedData);
            }
          }
        } catch (_) {}

        db.collection('enrollments').doc(user.uid + '_' + courseId).get()
          .then(function(doc) {
            if (!doc.exists || doc.data().status !== 'active') {
              try { localStorage.removeItem(cacheKey); } catch (_) {}
              showError('No estás matriculado en este curso. Matricúlate para acceder.', 'block');
              return;
            }

            var fbData = doc.data();
            cacheEnrollment(user.uid, fbData);
            renderPanel(COURSES[courseId], fbData);
          })
          .catch(function(err) {
            showError('No pudimos verificar tu matrícula. Intenta recargar la página.<br><small>' + (err && err.message ? err.message : '') + '</small>', 'error_outline');
          });
      }).catch(function(err) {
        showError('No se pudo cargar la información del curso. Intenta recargar la página.<br><small>' + (err && err.message ? err.message : '') + '</small>', 'error_outline');
      });
    });

    // ...el resto del JS funcional original (helpers, renderPanel, etc.)...
  </script>
</body>
</html>
