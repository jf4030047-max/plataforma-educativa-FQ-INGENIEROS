  <script>
  /* Forzar fecha correcta desde REST API (sin caché) */
  (function(){
    var M=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    var D=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    function fmt(s){var p=s.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);return D[d.getDay()]+' '+d.getDate()+' de '+M[d.getMonth()]+', '+d.getFullYear();}
    function v(f){return f?(f.stringValue||f.integerValue||''):'';}
    var B='https://firestore.googleapis.com/v1/projects/fq-ingenieros-educativa/databases/(default)/documents/courses/';
    fetch(B+'topografia-civil-3d?t='+Date.now()).then(function(r){return r.json()}).then(function(j){
      var f=j.fields||{};var el;
      if(v(f.startDate)&&(el=document.getElementById('topo-date')))el.innerHTML='<span class="material-icons-round">calendar_month</span> '+fmt(v(f.startDate));
      if(v(f.duration)&&(el=document.getElementById('topo-duration')))el.innerHTML='<span class="material-icons-round">schedule</span> '+v(f.duration)+(v(f.modality)?' · '+v(f.modality):'');
      if((el=document.getElementById('topo-price'))){var p=v(f.price);el.innerHTML='<span class="material-icons-round">sell</span> '+(p&&p!=='0'?'S/ '+p:'Precio por definir');}
    }).catch(function(){});
    fetch(B+'sst-obras-civiles?t='+Date.now()).then(function(r){return r.json()}).then(function(j){
      var f=j.fields||{};var el;
      if(v(f.startDate)&&(el=document.getElementById('sst-date')))el.innerHTML='<span class="material-icons-round">calendar_month</span> '+fmt(v(f.startDate));
      if(v(f.startTime)&&(el=document.getElementById('sst-time'))){var t=v(f.startTime);if(v(f.endTime))t+=' — '+v(f.endTime);el.innerHTML='<span class="material-icons-round">schedule</span> '+t;}
    }).catch(function(){});
  })();
  </script>

  <!-- Eliminados scripts duplicados/conflictivos. La barra de usuario es gestionada solo por assets/js/auth-ui.js -->
</body>
  <script>
    // Forzar precio de topografía desde REST API, sin caché
    fetch('https://firestore.googleapis.com/v1/projects/fq-ingenieros-educativa/databases/(default)/documents/courses/topografia-civil-3d?t='+Date.now())
      .then(r=>r.json())
      .then(j=>{
        var f=j.fields||{};
        var el=document.getElementById('price-topografia');
        var price=f.price&&(f.price.integerValue||f.price.stringValue);
        if(el) el.textContent=(price&&price!=='0')?'S/ '+price:'Por definir';
      });
  </script>
