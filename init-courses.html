<!DOCTYPE html>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f7f9fc; padding: 40px 20px; min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: #fff; border: 1px solid #dce3ed; border-radius: 12px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    h1 { font-size: 28px; font-weight: 800; color: #0f172a; margin-bottom: 12px; }
    p { color: #64748b; line-height: 1.6; margin-bottom: 20px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
    .btn-primary { background: #1565c0; color: #fff; }
    .btn-primary:hover { background: #1e88e5; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; pointer-events: none; }
    .status { margin-top: 24px; padding: 16px; border-radius: 8px; font-size: 13px; display: none; }
    .status.info { background: #dbeafe; color: #1565c0; border: 1px solid #bfdbfe; }
    .status.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .status.loading { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .courses-list { margin-top: 24px; }
    .course-item { padding: 12px; background: #f8fafc; border-radius: 6px; margin-bottom: 8px; font-size: 13px; color: #475569; }
    .course-item strong { color: #0f172a; font-weight: 600; }
  </style>
</head>
<body>

    <div class="card">
      <h1>🎓 Inicializar Cursos</h1>
      <p>Este script agregará los 3 cursos iniciales a la colección "courses" en Firestore.</p>
      
      <div class="courses-list">
        <div class="course-item"><strong>1. Seguridad y Salud en el Trabajo en Obras Civiles</strong> (Gratis)</div>
        <div class="course-item"><strong>2. Topografía en Civil 3D</strong> (S/ 50)</div>
        <div class="course-item"><strong>3. Supervisión de Obra</strong> (S/ 80)</div>
      </div>

      <button class="btn btn-primary" id="initBtn" onclick="initializeCourses()">
        <span>▶️</span> Inicializar Cursos
      </button>
      <button class="btn btn-primary" id="forceBtn" onclick="forceUpdateCourses()" style="background:#ea580c;margin-left:8px">
        <span>🔄</span> Forzar Actualización Completa
      </button>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
  <script src="assets/js/firebase-config.js"></script>

          ]}
        ],

          { icon: 'videocam', text: '1 sesión en vivo (1 hora)' },
          { icon: 'play_circle', text: 'Acceso a la grabación después de la capacitación' },

          { id: 'h1', label: '5:00 p.m. – 6:00 p.m.', detail: 'Lunes y miércoles' },
          { id: 'h2', label: '7:00 p.m. – 8:00 p.m.', detail: 'Martes y jueves' }
        ],
        temario: [
          'Rol del supervisor de obra',

          { icon: 'forum', text: 'Grupo de WhatsApp' },
          { icon: 'quiz', text: 'Examen de certificación' }

    function showStatus(message, type = 'info') {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
      statusEl.style.display = 'block';
    }

    async function initializeCourses() {
      const btn = document.getElementById('initBtn');
      btn.disabled = true;

      try {
        showStatus('Verificando autenticación...', 'loading');
        
        // Check if user is authenticated
        const user = auth.currentUser;
        if (!user) {
          showStatus('❌ Error: No estás autenticado. Por favor, inicia sesión en el admin panel primero.', 'error');
          btn.disabled = false;
          return;
        }

        showStatus('Inicializando cursos en Firestore...', 'loading');

        let createdCount = 0;
        let updatedCount = 0;
        for (const course of INITIAL_COURSES) {
          try {
            const docSnapshot = await db.collection('courses').doc(course.id).get();
            
            if (!docSnapshot.exists) {
              // Crear nuevo
              await db.collection('courses').doc(course.id).set({
                ...course,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              createdCount++;
            } else {
              // Actualizar existente con datos completos (temario, includes, schedules, etc.)
              const existing = docSnapshot.data();
              const updateData = {};
              
              // Solo actualizar campos que faltan o están vacíos
              if (!existing.temario || existing.temario.length === 0) updateData.temario = course.temario;
              if (!existing.includes || existing.includes.length === 0) updateData.includes = course.includes;
              if (!existing.schedules || existing.schedules.length === 0) updateData.schedules = course.schedules;
              if (!existing.tags || existing.tags.length === 0) updateData.tags = course.tags;
              if (!existing.icon) updateData.icon = course.icon;
              if (!existing.badge) updateData.badge = course.badge;
              if (!existing.badgeLabel) updateData.badgeLabel = course.badgeLabel;
              if (!existing.modality) updateData.modality = course.modality;
              if (!existing.priceLabel) updateData.priceLabel = course.priceLabel;

              if (Object.keys(updateData).length > 0) {
                updateData.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection('courses').doc(course.id).update(updateData);
                updatedCount++;
              }
            }
          } catch (err) {
            console.error(`Error processing course ${course.id}:`, err);
          }
        }

        showStatus(`✅ Éxito: ${createdCount} curso(s) creado(s), ${updatedCount} curso(s) actualizado(s) con datos completos (temario, includes, etc.). Puedes cerrar esta ventana.`, 'success');
      } catch (error) {
        console.error('Error:', error);
        showStatus(`❌ Error: ${error.message}`, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    // Auto-initialize on load if in admin perspective
    window.addEventListener('load', function() {
      if (auth.currentUser) {
        console.log('Usuario autenticado:', auth.currentUser.email);
      }
    });

    async function forceUpdateCourses() {
      const btn = document.getElementById('forceBtn');
      btn.disabled = true;

      try {
        const user = auth.currentUser;
        if (!user) {
          showStatus('❌ Error: No estás autenticado. Inicia sesión primero.', 'error');
          btn.disabled = false;
          return;
        }

        showStatus('Forzando actualización de todos los cursos...', 'loading');

        let count = 0;
        for (const course of INITIAL_COURSES) {
          try {
            await db.collection('courses').doc(course.id).set({
              ...course,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            count++;
          } catch (err) {
            console.error('Error updating ' + course.id + ':', err);
          }
        }

        showStatus('✅ ' + count + ' curso(s) actualizados con TODOS los datos (temario, includes, schedules, etc.).', 'success');
      } catch (error) {
        showStatus('❌ Error: ' + error.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
